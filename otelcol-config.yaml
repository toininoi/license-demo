receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
    
  # Export Metrics to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "app_metrics"
    send_timestamps: true
    metric_expiration: 180m


processors:
  batch:
  resource:
    attributes:
      - key: service.name
        action: insert
        value: apps-logs-via-otel-collector

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]