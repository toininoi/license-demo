services:
  # =========================================
  # FTL / EMS Nodes
  # =========================================
  ftlserver1:
    image: ems-ftl:10.4.1
    container_name: ftlserver1
    ports:
      - "8585:8585"
      - "7522:7222"
      - "7520:7220"
    volumes:
      - C:\Users\dmassimi\containers\resources\addons\ftl:/data/ftl
      - C:\temp:/tmp
      - C:\Users\dmassimi\containers\resources\addons\license:/data/license
    environment:
      - TIBFTL_LICENSE=/data/license/dmassimi-vdi_ANY.bin
      - LD_LIBRARY_PATH=/usr/lib64:/opt/tibco/ems/10.4/lib:/opt/tibco/ftl/7.2/lib
    command: ["-c", "/data/ftl/tibftlserver_cluster.yaml", "-n", "ftlserver1"]
    networks:
      - tibco-network

  ftlserver2:
    image: ems-ftl:10.4.1
    container_name: ftlserver2
    ports:
      - "8685:8585"
      - "7622:7222"
      - "7620:7220"
    volumes:
      - C:\Users\dmassimi\containers\resources\addons\ftl:/data/ftl
      - C:\temp:/tmp
      - C:\Users\dmassimi\containers\resources\addons\license:/data/license
    environment:
      - TIBFTL_LICENSE=/data/license/dmassimi-vdi_ANY.bin
      - LD_LIBRARY_PATH=/usr/lib64:/opt/tibco/ems/10.4/lib:/opt/tibco/ftl/7.2/lib
    command: ["-c", "/data/ftl/tibftlserver_cluster.yaml", "-n", "ftlserver2"]
    networks:
      - tibco-network

  ftlserver3:
    image: ems-ftl:10.4.1
    container_name: ftlserver3
    ports:
      - "8785:8585"
      - "7722:7222"
      - "7720:7220"
    volumes:
      - C:\Users\dmassimi\containers\resources\addons\ftl:/data/ftl
      - C:\temp:/tmp
      - C:\Users\dmassimi\containers\resources\addons\license:/data/license
    environment:
      - TIBFTL_LICENSE=/data/license/dmassimi-vdi_ANY.bin
      - LD_LIBRARY_PATH=/usr/lib64:/opt/tibco/ems/10.4/lib:/opt/tibco/ftl/7.2/lib
    command: ["-c", "/data/ftl/tibftlserver_cluster.yaml", "-n", "ftlserver3"]
    networks:
      - tibco-network
      
  rv-listener:
    image: tibco-rv:9.0.0
    container_name: rv-listener
    ports:
      - "7580:7580" # Maps local 7580 to container 7580
    volumes:
      - C:\Users\dmassimi\containers\resources\addons\license:/data/license
    environment:
      - TIBRV_LICENSE=file:///data/license/dmassimi-vdi_ANY.bin
    command: >
      bash -c "rvd -listen tcp:7500 -http 7580 & sleep 2 && tibrvlisten -service 7500 -network ';' -daemon tcp:7500 TEST.SUBJECT"
    networks:
      - tibco-network

  rv-sender:
    image: tibco-rv:9.0.0
    container_name: rv-sender
    ports:
      - "7581:7580" # Maps local 7581 to container 7580 to avoid collision
    volumes:
      - C:\Users\dmassimi\containers\resources\addons\license:/data/license
    environment:
      - TIBRV_LICENSE=file:///data/license/dmassimi-vdi_ANY.bin
    command: >
      bash -c "rvd -listen tcp:7500 -http 7580 & sleep 5; while true; do tibrvsend -service 7500 -network ';' -daemon tcp:7500 TEST.SUBJECT 'Hello from TIBCO RV 9.0.0 inside Docker!'; sleep 10; done"
    networks:
      - tibco-network
    depends_on:
      - rv-listener
      
  bwce_service:
    image: my-bw-app:6.12.2
    container_name: my-bw-app-6.12.2
    networks:
      - tibco-network
    environment:
      - BW_PROFILE=token
      - LICENSE_SOURCE=/data/license
      # 1. Point to the base URL only (no /api/v1/... path)
      # 2. Removed the http/protobuf override since BWCE forces gRPC
      - BW_JAVA_OPTS=-Dbw.engine.opentelemetry.enable=true -Dbw.engine.opentelemetry.span.exporter.endpoint=http://otel_collector:4317 -Dbw.engine.opentelemetry.metric.enable=true -Dbw.engine.opentelemetry.metric.exporter.endpoint=http://otel_collector:4317
    volumes:
      - C:/Users/dmassimi/containers/resources/addons/license:/data/license:ro
    ports:
      - "8080:8080"

  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.87.0
    container_name: otel_collector
    command: ["--config=/etc/otelcol-config.yaml"]
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
    networks:
      - tibco-network
    depends_on:
      - prometheus

  # =========================================
  # Monitoring Stack
  # =========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - tibco-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - tibco-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  tibco-network:
    driver: bridge